<!DOCTYPE html>
<html>
<head>
    <title>Resize Icons</title>
    <style>
        body { font-family: system-ui; padding: 2rem; max-width: 600px; margin: 0 auto; }
        .step { background: #f5f5f5; padding: 1rem; border-radius: 8px; margin: 1rem 0; }
        button { background: #8B4513; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        #status { margin-top: 1rem; padding: 1rem; background: #e8f0e8; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🖼️ Icon Resizer for PWA</h1>
    
    <div class="step">
        <h3>Step 1: Upload your WebP image</h3>
        <input type="file" id="uploadWebp" accept="image/webp">
    </div>

    <div class="step">
        <h3>Step 2: Generate all sizes</h3>
        <button id="generateBtn">Generate Icons</button>
    </div>

    <div id="status"></div>

    <script>
        let originalImage = null;
        
        document.getElementById('uploadWebp').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                    document.getElementById('status').innerHTML = '✅ Image loaded successfully!';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('generateBtn').addEventListener('click', function() {
            if (!originalImage) {
                alert('Please upload an image first');
                return;
            }

            const status = document.getElementById('status');
            status.innerHTML = 'Generating icons...<br>';

            // Generate Android WebP icons
            const webpSizes = [72, 96, 128, 144, 152, 192, 384, 512];
            webpSizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(originalImage, 0, 0, size, size);
                
                const link = document.createElement('a');
                link.download = `icon-${size}x${size}.webp`;
                link.href = canvas.toDataURL('image/webp');
                link.click();
                status.innerHTML += `✅ Generated icon-${size}x${size}.webp<br>`;
            });

            // Generate iOS PNG icons
            const pngSizes = [120, 152, 167, 180];
            pngSizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(originalImage, 0, 0, size, size);
                
                const link = document.createElement('a');
                link.download = `apple-touch-icon-${size}x${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                status.innerHTML += `✅ Generated apple-touch-icon-${size}x${size}.png<br>`;
            });

            // Generate main apple touch icon
            const canvas = document.createElement('canvas');
            canvas.width = 180;
            canvas.height = 180;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(originalImage, 0, 0, 180, 180);
            
            const link = document.createElement('a');
            link.download = 'apple-touch-icon.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            status.innerHTML += '✅ Generated apple-touch-icon.png<br>';
            
            status.innerHTML += '<br><strong>🎉 Done! Move all these files to your /icons folder</strong>';
        });
    </script>
</body>
</html>
