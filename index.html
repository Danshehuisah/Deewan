<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديوان الشيخ إبراهيم إنياس</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="app-container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-brand">
                <h1>ديوان الشيخ إبراهيم إنياس</h1>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="#" class="active">الرئيسية</a>
                <a href="#" id="themeToggle">المظهر</a>
                <a href="#" id="fontToggle">الخط</a>
                <a href="#" id="languageToggle">اللغة</a>
                <a href="#">المجتمع</a>
            </div>
        </nav>

        <!-- Theme Picker -->
        <div class="theme-picker" id="themePicker">
            <h3>اخْتَرِ الْمَظْهَرَ</h3>
            <div class="theme-options">
                <button class="theme-btn light-theme" data-theme="light">🌞 فَاتِحٌ</button>
                <button class="theme-btn dark-theme" data-theme="dark">🌙 دَاكِنٌ</button>
                <button class="theme-btn sepia-theme" data-theme="sepia">📜 سِيبِيَا</button>
                <button class="theme-btn green-theme" data-theme="green">🌿 أَخْضَرُ مُرِيحٌ</button>
            </div>
        </div>

        <!-- Font Picker -->
        <div class="font-picker" id="fontPicker">
            <h3>اخْتَرِ الْخَطَّ الْعَرَبِيَّ</h3>
            <div class="font-options">
                <button class="font-btn" data-font="amiri">📝 أَمِيرِي</button>
                <button class="font-btn" data-font="scheherazade">📖 شَهْرَزَادَ</button>
                <button class="font-btn" data-font="kufi">🕌 كُوفِي</button>
                <button class="font-btn" data-font="naskh">📜 نَسْخٌ</button>
            </div>
            <div class="font-size-control">
                <label for="fontSizeSlider">حَجْمُ الْخَطِّ</label>
                <input type="range" id="fontSizeSlider" min="14" max="32" value="20" step="1">
                <span class="font-size-value" id="fontSizeValue">20</span>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <h2 class="welcome-title">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</h2>
            <p class="welcome-subtitle">اخْتَرِ الدِّيوَانَ لِلْقِرَاءَةِ</p>
            
            <div class="diwan-grid" id="diwanGrid">
                <!-- Diwan buttons will be added by JavaScript -->
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
